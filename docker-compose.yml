services:

  # ── Icecast2 Audio Server ──────────────────────────────────────────────────
  icecast:
    image: libretime/icecast:2.4.4
    restart: unless-stopped
    ports:
      - "${ICECAST_PORT:-8000}:8000"
    volumes:
      - ./config/icecast.xml:/etc/icecast2/icecast.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Whisper Transkriptions-Server ─────────────────────────────────────────
  # Lokaler Fallback — wird nur genutzt wenn WHISPER_REMOTE_URL leer ist.
  # Für GPU-Rechner: WHISPER_REMOTE_URL in .env setzen → dieser Service wird ignoriert.
  whisper:
    build:
      context: .
      args:
        WITH_WHISPER: "true"      # faster-whisper immer installieren
    restart: unless-stopped
    entrypoint: ["python3", "whisper_server.py"]
    volumes:
      - ./config:/app/config:ro               # liest initial_prompt aus config.json
      - whisper-cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - WHISPER_MODEL=${WHISPER_MODEL:-medium}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_PORT=9001
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s    # Modell-Ladezeit abwarten

  # ── FRN Web TX Server ──────────────────────────────────────────────────────
  frn-web:
    build:
      context: .
      args:
        WITH_WHISPER: "false"
    restart: unless-stopped
    ports:
      - "${TX_PORT:-8765}:8765"
    volumes:
      - ./config:/app/config                      # config.json, tx_users.json, tx_rooms.json
      - frn-recordings:/opt/FRN/recordings        # WAV-Aufnahmen
      - frn-archive:/opt/FRN/archive              # SQLite DB + Opus-Dateien
    environment:
      - PYTHONUNBUFFERED=1
      # Externer Whisper-Server überschreibt den lokalen whisper-Service:
      - WHISPER_REMOTE_URL=${WHISPER_REMOTE_URL:-http://whisper:9001/transcribe}
    extra_hosts:
      - "host.docker.internal:host-gateway"       # Zugriff auf Host (FRN_Server.jar)
    depends_on:
      icecast:
        condition: service_healthy
      whisper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/config')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── FRN → Icecast Stream Relay (ein Container, alle Räume) ────────────────
  frn-streams:
    build:
      context: .
      args:
        WITH_WHISPER: "false"
    restart: unless-stopped
    entrypoint: ["python3", "frn_stream_runner.py"]
    volumes:
      - ./config:/app/config
      - frn-recordings:/opt/FRN/recordings
    environment:
      - PYTHONUNBUFFERED=1
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      icecast:
        condition: service_healthy
      frn-web:
        condition: service_healthy

volumes:
  frn-recordings:    # WAV-Aufnahmen (temporär, werden nach Transkription behalten)
  frn-archive:       # SQLite-Datenbank + Opus-Audiodateien (persistent!)
  whisper-cache:     # Whisper-Modell-Cache (einmaliger Download ~1.5 GB für medium)
