services:

  # ── Icecast2 Audio Server ──────────────────────────────────────────────────
  icecast:
    image: libretime/icecast:2.4.4
    restart: unless-stopped
    ports:
      - "${ICECAST_PORT:-8000}:8000"
    volumes:
      - ./config/icecast.xml:/etc/icecast2/icecast.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FRN Web TX Server ──────────────────────────────────────────────────────
  frn-web:
    build:
      context: .
      args:
        WITH_WHISPER: ${WITH_WHISPER:-false}
    restart: unless-stopped
    ports:
      - "${TX_PORT:-8765}:8765"
    volumes:
      - ./config:/app/config                      # config.json, tx_users.json, tx_rooms.json
      - frn-recordings:/opt/FRN/recordings        # WAV-Aufnahmen
      - frn-archive:/opt/FRN/archive              # SQLite DB + Opus-Dateien
      - whisper-cache:/root/.cache/huggingface    # Whisper-Modell (wird 1x geladen)
    environment:
      - PYTHONUNBUFFERED=1
      # Externer Whisper-Server (optional, überschreibt config.json whisper.remote_url)
      - WHISPER_REMOTE_URL=${WHISPER_REMOTE_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"       # Zugriff auf Host (FRN_Server.jar)
    depends_on:
      icecast:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/config')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── FRN → Icecast Stream Relay (ein Container, alle Räume) ────────────────
  frn-streams:
    build:
      context: .
      args:
        WITH_WHISPER: "false"    # Streams brauchen kein Whisper
    restart: unless-stopped
    entrypoint: ["python3", "frn_stream_runner.py"]
    volumes:
      - ./config:/app/config
      - frn-recordings:/opt/FRN/recordings
    environment:
      - PYTHONUNBUFFERED=1
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      icecast:
        condition: service_healthy
      frn-web:
        condition: service_healthy

volumes:
  frn-recordings:    # WAV-Aufnahmen (temporär, werden nach Transkription behalten)
  frn-archive:       # SQLite-Datenbank + Opus-Audiodateien (persistent!)
  whisper-cache:     # Whisper-Modell-Cache (einmaliger Download ~1.5 GB für medium)
